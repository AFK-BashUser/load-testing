name: JMeter Load Test

on:
  workflow_dispatch:
    inputs:
      threads:
        description: 'Number of Users'
        required: true
        default: '10000'
      rampup:
        description: 'Ramp-up Period (seconds)'
        required: true
        default: '300'
      duration:
        description: 'Duration (seconds)'
        required: true
        default: '300'

jobs:
  jmeter:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Install Java with more memory
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Set JVM Options
      run: |
        echo "JVM_ARGS=-Xms2g -Xmx5g" >> $GITHUB_ENV

    - name: Download JMeter
      run: |
        wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
        tar -xzf apache-jmeter-5.6.3.tgz

    - name: Run JMeter Test
      run: |
        export HEAP="-Xms2g -Xmx5g"
        apache-jmeter-5.6.3/bin/jmeter \
          -n \
          -t CareerHelper_Complete_165APIs.jmx \
          -l results.csv \
          -JNUM_USERS=${{ github.event.inputs.threads }} \
          -JRAMP_UP=${{ github.event.inputs.rampup }} \
          -JDURATION=${{ github.event.inputs.duration }}

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: jmeter-results
        path: results.csv
